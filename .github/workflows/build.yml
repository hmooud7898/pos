name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          # Install gradle to generate wrapper
          curl -s "https://get.sdkman.io" | bash || true
          source "$HOME/.sdkman/bin/sdkman-init.sh" || true
          sdk install gradle 8.2 || true

          # Try to use system gradle first
          if command -v gradle &> /dev/null; then
            gradle wrapper --gradle-version=8.2
          else
            # Download gradle manually
            wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
            unzip -q gradle-8.2-bin.zip
            ./gradle-8.2/bin/gradle wrapper --gradle-version=8.2
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-googletv-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_HOME/licenses/google-gdk-license
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-34" 2>/dev/null || true

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find APK
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RestaurantPOS-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            *.log
          if-no-files-found: ignore
          retention-days: 7
